<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lo-Fi Arcade</title>
<script src="https://w.soundcloud.com/player/api.js"></script>
<style>
  body {
    background-color: #0d0d12;
    color: #ffffff;
    font-family: 'Courier New', Courier, monospace;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  h1 {
    font-size: 3rem;
    letter-spacing: 5px;
    color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc, 0 0 40px #0099ff;
    margin-top: 40px;
    margin-bottom: 10px;
  }

  .subtitle {
    color: #a3a3c2;
    margin-bottom: 30px;
    letter-spacing: 2px;
  }

  .media-hub {
    background: #1a1a24;
    border: 1px solid #33334d;
    border-radius: 10px;
    padding: 20px;
    width: 600px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    margin-bottom: 30px;
    text-align: center;
  }

  .media-hub h3 {
    margin-top: 0;
    color: #ff00ff;
    text-shadow: 0 0 5px #ff00ff;
  }

  #visualizerCanvas {
    width: 100%;
    height: 100px;
    background: #12121a;
    border-radius: 5px;
    margin-bottom: 15px;
    box-shadow: inset 0 0 10px rgba(0, 255, 204, 0.1);
    display: block;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
  }

  button {
    background: #2a2a35;
    color: #00ffcc;
    border: 1px solid #00ffcc;
    padding: 10px 20px;
    cursor: pointer;
    font-family: 'Courier New', Courier, monospace;
    text-transform: uppercase;
    transition: 0.3s;
  }

  button:hover {
    background: #00ffcc;
    color: #0d0d12;
    box-shadow: 0 0 10px #00ffcc;
  }

  #sc-player {
    display: none; 
  }

  #gameCanvas {
    background: #12121a;
    border: 2px solid #ff00ff;
    box-shadow: 0 0 20px #ff00ff, inset 0 0 20px rgba(255, 0, 255, 0.2);
    border-radius: 8px;
    display: block;
  }

  .controls-hint {
    margin-top: 15px;
    color: #666699;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

  <h1>LO-FI ARCADE</h1>
  <div class="subtitle">CHILL BEATS // NEON NIGHTS</div>

  <div class="media-hub">
    <h3 id="track-title">WAITING FOR USER...</h3>
    
    <canvas id="visualizerCanvas" width="560" height="100"></canvas>

    <!-- Corrected URL for the Lofi Chill set -->
    <iframe id="sc-player" width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" 
      src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/291136437&color=%2300ffcc&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false">
    </iframe>

    <div class="controls">
      <button id="play-btn">START AUDIO</button>
      <button id="next-btn">Next Track</button>
    </div>
  </div>

  <canvas id="gameCanvas" width="600" height="400"></canvas>
  
  <div class="controls-hint">Use Left / Right Arrow Keys to Dodge</div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game Entities
    let player = {
      x: 275,
      y: 330,
      width: 40,
      height: 40,
      color: '#00ffcc',
      speed: 7,
      dx: 0
    };

    let obstacles = [];
    let score = 0;
    let frameCount = 0;
    let isGameOver = false;

    function drawPlayer() {
      ctx.fillStyle = player.color;
      ctx.shadowBlur = 15;
      ctx.shadowColor = player.color;
      ctx.fillRect(player.x, player.y, player.width, player.height);
      ctx.fillStyle = '#ffffff';
      ctx.shadowBlur = 0;
      ctx.fillRect(player.x + 10, player.y + 10, 20, 20);
    }

    function createObstacle() {
      const minWidth = 30;
      const maxWidth = 100;
      const width = Math.random() * (maxWidth - minWidth) + minWidth;
      const x = Math.random() * (canvas.width - width);
      const speed = 4 + (score * 0.15);
      obstacles.push({ x: x, y: -50, width: width, height: 20, color: '#ff00ff', speed: speed });
    }

    function drawObstacles() {
      obstacles.forEach(obs => {
        ctx.fillStyle = obs.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = obs.color;
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
        ctx.shadowBlur = 0;
      });
    }

    function moveObstacles() {
      for (let i = 0; i < obstacles.length; i++) {
        obstacles[i].y += obstacles[i].speed;
        if (obstacles[i].y > canvas.height) {
          obstacles.splice(i, 1);
          score += 10;
          i--;
        }
      }
    }

    function detectCollision() {
      for (let i = 0; i < obstacles.length; i++) {
        let obs = obstacles[i];
        if (player.x < obs.x + obs.width && player.x + player.width > obs.x && player.y < obs.y + obs.height && player.y + player.height > obs.y) {
          isGameOver = true;
        }
      }
    }

    function drawScore() {
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 18px Courier New';
      ctx.shadowBlur = 0;
      ctx.fillText('SCORE: ' + score, 15, 30);
    }

    function update() {
      if (isGameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ff0033';
        ctx.font = 'bold 40px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('SYSTEM FAILURE', canvas.width / 2, canvas.height / 2);
        
        ctx.fillStyle = '#ffffff';
        ctx.font = '16px Courier New';
        ctx.fillText('FINAL SCORE: ' + score, canvas.width / 2, (canvas.height / 2) + 40);
        ctx.fillText('CLICK CANVAS TO REBOOT', canvas.width / 2, (canvas.height / 2) + 80);
        return;
      }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      player.x += player.dx;
      if (player.x < 0) player.x = 0;
      if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
      drawPlayer();
      drawObstacles();
      drawScore();
      moveObstacles();
      detectCollision();
      frameCount++;
      let spawnRate = Math.max(20, 50 - Math.floor(score / 50));
      if (frameCount % spawnRate === 0) createObstacle();
      requestAnimationFrame(update);
    }

    function resetGame() {
      if (isGameOver) {
        score = 0;
        obstacles = [];
        frameCount = 0;
        isGameOver = false;
        player.x = 275;
        update();
      }
    }

    canvas.addEventListener('click', resetGame);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') player.dx = player.speed;
      if (e.key === 'ArrowLeft') player.dx = -player.speed;
    });
    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') player.dx = 0;
    });

    update();

    // --- SOUNDCLOUD & VISUALIZER LOGIC ---
    const iframe = document.getElementById('sc-player');
    const widget = SC.Widget(iframe);
    const visCanvas = document.getElementById('visualizerCanvas');
    const visCtx = visCanvas.getContext('2d');
    const trackLabel = document.getElementById('track-title');
    const playBtn = document.getElementById('play-btn');

    let visualizerStarted = false;

    widget.bind(SC.Widget.Events.READY, () => {
      trackLabel.innerText = "READY: CLICK START AUDIO";
    });

    widget.bind(SC.Widget.Events.PLAY, () => {
      playBtn.innerText = "PAUSE AUDIO";
      widget.getCurrentSound((sound) => {
        trackLabel.innerText = "NOW PLAYING: " + sound.title.toUpperCase();
      });
      if (!visualizerStarted) {
        visualizerStarted = true;
        startVisualizer();
      }
    });

    widget.bind(SC.Widget.Events.PAUSE, () => {
      playBtn.innerText = "RESUME AUDIO";
    });

    playBtn.addEventListener('click', () => {
      widget.toggle();
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      widget.next();
    });

    function startVisualizer() {
      function render() {
        if (isGameOver) {
           visCtx.fillStyle = '#12121a';
           visCtx.fillRect(0, 0, visCanvas.width, visCanvas.height);
           requestAnimationFrame(render);
           return;
        }
        
        visCtx.fillStyle = 'rgba(18, 18, 26, 0.2)';
        visCtx.fillRect(0, 0, visCanvas.width, visCanvas.height);
        
        const barWidth = (visCanvas.width / 64);
        for (let i = 0; i < 64; i++) {
          const barHeight = Math.random() * 50 + (Math.sin(Date.now() / 200 + i) * 20);
          visCtx.fillStyle = `rgb(0, 255, ${204 - i})`;
          visCtx.fillRect(i * (barWidth + 2), visCanvas.height - barHeight, barWidth, barHeight);
        }
        requestAnimationFrame(render);
      }
      render();
    }
  </script>
</body>
</html>
