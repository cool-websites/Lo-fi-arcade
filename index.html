<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lo-Fi Arcade</title>
<style>
  body {
    background-color: #0d0d12;
    color: #ffffff;
    font-family: 'Courier New', Courier, monospace;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  h1 {
    font-size: 3rem;
    letter-spacing: 5px;
    color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc, 0 0 40px #0099ff;
    margin-top: 40px;
    margin-bottom: 10px;
  }

  .subtitle {
    color: #a3a3c2;
    margin-bottom: 30px;
    letter-spacing: 2px;
  }

  .media-hub {
    background: #1a1a24;
    border: 1px solid #33334d;
    border-radius: 10px;
    padding: 20px;
    width: 600px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    margin-bottom: 30px;
    text-align: center;
  }

  .media-hub h3 {
    margin-top: 0;
    color: #ff00ff;
    text-shadow: 0 0 5px #ff00ff;
  }

  /* Added Visualizer Canvas Style */
  #visualizerCanvas {
    width: 100%;
    height: 100px;
    background: #12121a;
    border-radius: 5px;
    margin-bottom: 15px;
    box-shadow: inset 0 0 10px rgba(0, 255, 204, 0.1);
    display: block;
  }

  audio {
    width: 100%;
    outline: none;
    border-radius: 5px;
  }

  /* Customizing the default audio player slightly across browsers */
  audio::-webkit-media-controls-panel {
    background-color: #2a2a35;
  }
  audio::-webkit-media-controls-current-time-display,
  audio::-webkit-media-controls-time-remaining-display {
    color: #00ffcc;
  }

  #gameCanvas {
    background: #12121a;
    border: 2px solid #ff00ff;
    box-shadow: 0 0 20px #ff00ff, inset 0 0 20px rgba(255, 0, 255, 0.2);
    border-radius: 8px;
    display: block;
  }

  .controls-hint {
    margin-top: 15px;
    color: #666699;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

  <h1>LO-FI ARCADE</h1>
  <div class="subtitle">CHILL BEATS // NEON NIGHTS</div>

  <div class="media-hub">
    <h3>NOW PLAYING: Lo-Fi tracks 4 u // MAMMA-NOIS</h3>
    
    <!-- Audio Visualizer Canvas Added Here -->
    <canvas id="visualizerCanvas" width="560" height="100"></canvas>

    <!-- Placeholder audio stream. Note the added id and crossorigin attribute -->
    <audio id="bgm" crossorigin="anonymous" controls loop preload="auto">
      <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
  </div>

  <canvas id="gameCanvas" width="600" height="400"></canvas>
  
  <div class="controls-hint">Use Left / Right Arrow Keys to Dodge</div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game Entities
    let player = {
      x: 275,
      y: 330,
      width: 40,
      height: 40,
      color: '#00ffcc',
      speed: 7,
      dx: 0
    };

    let obstacles = [];
    let particles = [];
    let score = 0;
    let frameCount = 0;
    let isGameOver = false;

    // Draw Functions
    function drawPlayer() {
      ctx.fillStyle = player.color;
      ctx.shadowBlur = 15;
      ctx.shadowColor = player.color;
      ctx.fillRect(player.x, player.y, player.width, player.height);
      
      // Inner core for styling
      ctx.fillStyle = '#ffffff';
      ctx.shadowBlur = 0;
      ctx.fillRect(player.x + 10, player.y + 10, 20, 20);
    }

    function createObstacle() {
      const minWidth = 30;
      const maxWidth = 100;
      const width = Math.random() * (maxWidth - minWidth) + minWidth;
      const x = Math.random() * (canvas.width - width);
      const speed = 4 + (score * 0.15); // Speed increases as score goes up
      
      obstacles.push({
        x: x,
        y: -50,
        width: width,
        height: 20,
        color: '#ff00ff',
        speed: speed
      });
    }

    function drawObstacles() {
      obstacles.forEach(obs => {
        ctx.fillStyle = obs.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = obs.color;
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
        ctx.shadowBlur = 0;
      });
    }

    // Mechanics
    function moveObstacles() {
      for (let i = 0; i < obstacles.length; i++) {
        obstacles[i].y += obstacles[i].speed;
        
        // Remove obstacle if it goes off screen and add score
        if (obstacles[i].y > canvas.height) {
          obstacles.splice(i, 1);
          score += 10;
          i--;
        }
      }
    }

    function detectCollision() {
      for (let i = 0; i < obstacles.length; i++) {
        let obs = obstacles[i];
        
        // AABB Collision Detection
        if (player.x < obs.x + obs.width &&
            player.x + player.width > obs.x &&
            player.y < obs.y + obs.height &&
            player.y + player.height > obs.y) {
          isGameOver = true;
        }
      }
    }

    function drawScore() {
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 18px Courier New';
      ctx.shadowBlur = 0;
      ctx.fillText('SCORE: ' + score, 15, 30);
    }

    // Main Game Loop
    function update() {
      if (isGameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#ff0033';
        ctx.font = 'bold 40px Courier New';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ff0033';
        ctx.textAlign = 'center';
        ctx.fillText('SYSTEM FAILURE', canvas.width / 2, canvas.height / 2);
        
        ctx.fillStyle = '#ffffff';
        ctx.font = '20px Courier New';
        ctx.shadowBlur = 0;
        ctx.fillText('FINAL SCORE: ' + score, canvas.width / 2, (canvas.height / 2) + 40);
        ctx.fillText('Press F5 to Reboot', canvas.width / 2, (canvas.height / 2) + 80);
        return;
      }

      // Clear Canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Apply movement
      player.x += player.dx;

      // Wall boundaries
      if (player.x < 0) {
        player.x = 0;
      } else if (player.x + player.width > canvas.width) {
        player.x = canvas.width - player.width;
      }

      drawPlayer();
      drawObstacles();
      drawScore();
      
      moveObstacles();
      detectCollision();

      frameCount++;
      
      // Spawn rate gets slightly faster as score increases
      let spawnRate = Math.max(20, 50 - Math.floor(score / 50));
      if (frameCount % spawnRate === 0) {
        createObstacle();
      }

      requestAnimationFrame(update);
    }

    // Input Handling
    function moveRight() {
      player.dx = player.speed;
    }

    function moveLeft() {
      player.dx = -player.speed;
    }

    function stop() {
      player.dx = 0;
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') {
        moveRight();
      } else if (e.key === 'ArrowLeft') {
        moveLeft();
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
        stop();
      }
    });

    // Start game
    update();


    // --- NEW: COMPLEX AUDIO VISUALIZER LOGIC ---
    const visualizerCanvas = document.getElementById('visualizerCanvas');
    const visCtx = visualizerCanvas.getContext('2d');
    const audioElement = document.getElementById('bgm');
    let audioContext;
    let audioSource;
    let analyser;

    // Draw idle state before user hits play
    visCtx.fillStyle = '#12121a';
    visCtx.fillRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
    visCtx.fillStyle = '#a3a3c2';
    visCtx.font = '14px Courier New';
    visCtx.textAlign = 'center';
    visCtx.fillText('PRESS PLAY TO INITIATE VISUALIZER', visualizerCanvas.width / 2, visualizerCanvas.height / 2);

    // Browsers require a user interaction (like clicking play) to start the AudioContext
    audioElement.addEventListener('play', () => {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        audioSource = audioContext.createMediaElementSource(audioElement);
        analyser = audioContext.createAnalyser();
        
        audioSource.connect(analyser);
        analyser.connect(audioContext.destination);
        
        analyser.fftSize = 256;
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        function renderFrame() {
          requestAnimationFrame(renderFrame);
          analyser.getByteFrequencyData(dataArray);

          // Use rgba to create a slight motion blur/trail effect
          visCtx.fillStyle = 'rgba(18, 18, 26, 0.8)';
          visCtx.fillRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);

          const barWidth = (visualizerCanvas.width / bufferLength) * 2.5;
          let x = 0;

          for (let i = 0; i < bufferLength; i++) {
            const barHeight = dataArray[i] / 2;

            // Cyberpunk/Neon color gradient matching the theme
            const r = barHeight + (25 * (i / bufferLength));
            const g = 255 * (1 - (i / bufferLength));
            const b = 255;

            visCtx.fillStyle = `rgb(${Math.floor(r)}, ${Math.floor(g)}, ${b})`;
            visCtx.shadowBlur = 10;
            visCtx.shadowColor = visCtx.fillStyle;
            
            // Draw bars growing from the bottom up
            visCtx.fillRect(x, visualizerCanvas.height - barHeight, barWidth, barHeight);

            x += barWidth + 2; // +2 for a small gap between bars
          }
        }
        renderFrame();
      } else if (audioContext.state === 'suspended') {
        audioContext.resume();
      }
    });
  </script>
</body>
</html>
